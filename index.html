  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--navy); min-height:100vh; overflow-x:hidden; }

  #landing { min-height:100vh; display:flex; flex-direction:column; position:relative; overflow:hidden; }

  .blob-1 { width:500px; height:500px; background:var(--sage-light); top:-100px; right:-100px; }
  .blob-2 { width:300px; height:300px; background:var(--terracotta-light); bottom:100px; left:-50px; }
  .blob-3 { width:200px; height:200px; background:var(--amber-light); top:40%; left:30%; }
  
  .landing-nav { position:relative; z-index:10; padding:28px 48px; display:flex; align-items:center; gap:12px; }
  .logo-mark { width:36px; height:36px; background:var(--navy); border-radius:10px; display:flex; align-items:center; justify-content:center; color:var(--cream); font-family:'Fraunces',serif; font-size:18px; font-weight:700; }
  .logo-text { font-family:'Fraunces',serif; font-size:15px; font-weight:500; color:var(--navy); letter-spacing:.02em; }
  
  .landing-hero { flex:1; display:flex; align-items:center; padding:0 48px; gap:80px; position:relative; z-index:10; max-width:1100px; margin:0 auto; width:100%; }
  .hero-content { flex:1; }

  .hero-badge-dot { width:6px; height:6px; background:var(--sage); border-radius:50%; animation:pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.5;transform:scale(.8)} }
  
  h1 { font-family:'Lora',serif; font-size:clamp(42px,5vw,64px); font-weight:500; line-height:1.1; color:var(--navy); margin-bottom:24px; }
  h1 em { font-style:italic; color:var(--terracotta); }
  .hero-desc { font-size:16px; line-height:1.7; color:var(--slate); max-width:480px; margin-bottom:40px; }
